<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steven Hill</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .bio {
            font-size: 1rem;
            line-height: 1.7;
            color: #aaa;
            margin-bottom: 2.5rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            padding: 0.7rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .links a:hover {
            border-color: #667eea;
            color: #fff;
            background: rgba(102, 126, 234, 0.1);
        }
        .footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"><img src="stevo-track.jpg" alt="Stevo on track" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
        <h1>Steven Hill</h1>
        <p class="tagline">London, UK</p>
        <p class="bio">
            Welcome to my corner of the internet. More coming soon.
        </p>
        <div class="links">
            <a href="/bikes.html">🏍️ The Garage</a>
            <a href="mailto:steven.hill@holidayextras.com">Email</a>
            <a href="https://github.com/HXStevo" target="_blank">GitHub</a>
        </div>
        <p class="footer">© 2026 Steven Hill</p>
    </div>
</body>
</html>
